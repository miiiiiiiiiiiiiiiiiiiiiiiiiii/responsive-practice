<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Responsive</title>
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <h2 class="question--title">Q1 サイズ変更</h2>
  <div class="box"></div>

  <h2 class="question--title">Q2 色変更</h2>
  <div class="box2"></div>

  <h2 class="question--title">Q3 margin値の変更</h2>
  <div class="box-wrap">
    <div class="box3 blue"></div>
    <div class="box3 green"></div>
  </div>

  <h2 class="question--title">Q4 floatの解除</h2>
  <div class="float-wrap clearfix">
    <div class="float-box red"></div>
    <div class="float-box blue2"></div>
  </div>

  <h2 class="question--title">Q5 flexboxの入れ替え(逆順)</h2>
  <div class="flex-reverse-wrap">
    <div class="flex-box red3">A</div>
    <div class="flex-box blue3">B</div>
    <div class="flex-box orange3">C</div>
  </div>

  <h2 class="question--title">Q6 flexboxの入れ替え(指定)</h2>
  <div class="flex-order-wrap">
    <div class="flex-order-box green2">A</div>
    <div class="flex-order-box yellow2">B</div>
    <div class="flex-order-box pink2">C</div>
  </div>

  <h2 class="question--title">Q7 要素の表示・非表示</h2>
  <div class="display-wrap">
    <div class="display-box red4"></div>
    <div class="display-box blue4"></div>
    <div class="display-box green4"></div>
  </div>
</body>

</html>
